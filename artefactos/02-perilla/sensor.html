<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensor perilla</title>
  <style>
    body {
      font-family: sans-serif; padding: 20px; text-align: center;
      background: #fafafa;
    }
    #instr {
      font-size: 22px; margin-top: 20px;
    }
    #valor {
      font-size: 50px; margin-top: 30px; color: #2a7; font-weight: bold;
    }
    button {
      margin-top: 30px; padding: 16px 32px; font-size: 18px;
      background: #2a7; color: white; border: none; border-radius: 30px;
    }
  </style>
</head>
<body>
  <div id="instr">Pon el teléfono plano sobre la mesa, en su posición inicial.</div>
  <div id="valor">—</div>
  <button id="calibrar">Calibrar como posición 0</button>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const instr = document.getElementById("instr");
    const valorEl = document.getElementById("valor");
    const btnCalibrar = document.getElementById("calibrar");

    // ---- INICIAR SENSOR DE ORIENTACIÓN ----
    // El componente Orientation entrega 4 valores:
    //   horizontal           → ángulo "compás" 0-360, salta al cruzar el origen
    //   vertical             → inclinación adelante/atrás
    //   horizontalContinuous → MISMO ángulo pero SIN saltos al cruzar 360°
    //   verticalContinuous   → vertical sin saltos
    //
    // Para una perilla que puede girar varias vueltas en ambos sentidos,
    // horizontalContinuous es perfecto: si giras dos veces en sentido
    // horario, el valor llega a +720. Si giras en antihorario, llega a
    // valores negativos. Nunca se resetea.
    Protobject.Orientation.start(100); // muestreo cada 100 ms

    // ---- ESTADO ----
    let origen = null;          // valor de horizontalContinuous al calibrar
    let anguloPrevio = null;    // para evitar enviar lo mismo muchas veces
    const UMBRAL_GRADOS = 1;    // solo envía cambios > 1° (filtra ruido)

    // ---- LECTURA ----
    Protobject.Orientation.onData((data) => {
      const cont = data.horizontalContinuous;
      if (cont === undefined || cont === null) return;

      // Si aún no se calibró, mostrar el valor crudo para ayudar al
      // usuario a entender qué hace el sensor.
      if (origen === null) {
        valorEl.textContent = Math.round(cont) + "°";
        return;
      }

      // Ángulo relativo al origen. Aquí es donde nace el "evento semántico":
      // ya no es "el teléfono apunta al norte magnético X", sino "la perilla
      // ha girado Y grados desde que el usuario la calibró".
      const angulo = cont - origen;

      // Vueltas completas (positivo = horario, negativo = antihorario).
      // Math.trunc redondea hacia 0, así que -370° → -1 vuelta, +370° → +1.
      const vueltas = Math.trunc(angulo / 360);

      // Filtro de ruido: solo enviar si cambió más que UMBRAL_GRADOS
      // desde el último envío. Evita saturar con micro-vibraciones.
      if (anguloPrevio !== null && Math.abs(angulo - anguloPrevio) < UMBRAL_GRADOS) {
        return;
      }
      anguloPrevio = angulo;

      // Mostrar localmente
      valorEl.textContent = Math.round(angulo) + "°";

      // Enviar al PC un objeto con el ángulo y las vueltas
      Protobject.Core.send({ angulo: angulo, vueltas: vueltas }).to("index.html");
    });

    // ---- CALIBRACIÓN ----
    // Un solo toque: registra el ángulo actual como "0°".
    // El usuario puede recalibrar las veces que quiera.
    btnCalibrar.addEventListener("click", () => {
      // Necesitamos una lectura reciente. Forzamos: pedimos una vez.
      Protobject.Orientation.onData((data) => {
        if (data.horizontalContinuous === undefined) return;
        origen = data.horizontalContinuous;
        anguloPrevio = 0;
        instr.textContent = "✓ Calibrado. Gira el teléfono como una perilla.";
        btnCalibrar.textContent = "Recalibrar";
        // Enviar inmediatamente "0°" para que el PC vuelva al inicio
        Protobject.Core.send({ angulo: 0, vueltas: 0 }).to("index.html");
      });
    });
  </script>

  <script src="config.js"></script>
</body>
</html>
