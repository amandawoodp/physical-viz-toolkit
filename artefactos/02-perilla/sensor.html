<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sensor perilla</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif; padding: 20px; text-align: center;
      background: #fafafa; margin: 0;
    }
    #instr {
      font-size: 22px; margin-top: 20px;
    }
    #valor {
      font-size: 50px; margin-top: 20px; color: #2a7; font-weight: bold;
    }
    /* Botón GIGANTE y arriba para que sea imposible no tocarlo */
    #calibrar {
      display: block;
      width: 90%;
      max-width: 400px;
      margin: 30px auto;
      padding: 30px 20px;
      font-size: 24px;
      font-weight: bold;
      background: #2a7;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(0,0,0,0.2);
      touch-action: manipulation;
    }
    #calibrar:active {
      background: #1a5;
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div id="instr">Pon el teléfono plano sobre la mesa, en su posición inicial.</div>

  <button id="calibrar">📍 CALIBRAR COMO POSICIÓN 0</button>

  <div id="valor">—</div>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const instr = document.getElementById("instr");
    const valorEl = document.getElementById("valor");
    const btnCalibrar = document.getElementById("calibrar");

    // ---- INICIAR SENSOR DE ORIENTACIÓN ----
    Protobject.Orientation.start(100);

    // ---- ESTADO ----
    let origen = null;
    let anguloPrevio = null;
    let ultimoContinuous = null;
    const UMBRAL_GRADOS = 1;

    // ---- LECTURA ----
    Protobject.Orientation.onData((data) => {
      const cont = data.horizontalContinuous;
      if (cont === undefined || cont === null) return;

      // Guardamos siempre la última lectura, para que el botón Calibrar
      // pueda usarla sin tener que esperar el próximo onData.
      ultimoContinuous = cont;

      if (origen === null) {
        // Aún sin calibrar: mostrar valor crudo del sensor
        valorEl.textContent = Math.round(cont) + "° (sin calibrar)";
        return;
      }

      const angulo = cont - origen;
      const vueltas = Math.trunc(angulo / 360);

      if (anguloPrevio !== null && Math.abs(angulo - anguloPrevio) < UMBRAL_GRADOS) {
        return;
      }
      anguloPrevio = angulo;

      valorEl.textContent = Math.round(angulo) + "°";

      Protobject.Core.send({ angulo: angulo, vueltas: vueltas }).to("index.html");
    });

    // ---- CALIBRACIÓN ----
    // Función que hace la calibración. La llamamos tanto en click como
    // en touchstart, para que funcione en cualquier navegador.
    function calibrar(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }

      if (ultimoContinuous === null) {
        instr.textContent = "Esperando lectura del sensor... gira un poco el teléfono.";
        return;
      }

      origen = ultimoContinuous;
      anguloPrevio = 0;
      instr.textContent = "✓ Calibrado. Gira el teléfono como una perilla.";
      btnCalibrar.textContent = "🔄 RECALIBRAR";

      // Enviar inmediatamente "0°" para que el PC vuelva al inicio
      Protobject.Core.send({ angulo: 0, vueltas: 0 }).to("index.html");
      console.log("Calibrado. Origen =", origen);
    }

    // En iOS, touchstart es MÁS confiable que click.
    btnCalibrar.addEventListener("touchstart", calibrar);
    btnCalibrar.addEventListener("click", calibrar);
  </script>

  <script src="config.js"></script>
</body>
</html>
