<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sensor perilla</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: monospace; padding: 15px; margin: 0;
      background: #fafafa; font-size: 16px;
    }
    h2 { margin-top: 10px; font-size: 18px; }
    .box {
      background: white; border: 2px solid #ddd; border-radius: 8px;
      padding: 12px; margin: 10px 0;
    }
    .box.ok { border-color: #2a7; background: #eef9f3; }
    .box.err { border-color: #c44; background: #fdeeee; }
    #calibrar {
      display: block; width: 100%; padding: 25px;
      font-size: 22px; font-weight: bold;
      background: #2a7; color: white; border: none; border-radius: 14px;
      margin: 15px 0;
      touch-action: manipulation;
    }
    #calibrar:active { background: #1a5; }
    #permiso {
      display: block; width: 100%; padding: 18px;
      font-size: 18px; font-weight: bold;
      background: #e63946; color: white; border: none; border-radius: 14px;
      margin: 15px 0;
    }
    .pequeno { font-size: 13px; color: #666; }
  </style>
</head>
<body>

  <h2>🔍 Diagnóstico de la perilla v2</h2>

  <button id="permiso">PEDIR PERMISO DE ORIENTACIÓN (iOS)</button>

  <div class="box" id="boxPermiso">
    <strong>Permiso iOS:</strong> <span id="estadoPermiso">no solicitado</span>
  </div>

  <div class="box" id="boxLectura">
    <strong>Lecturas:</strong> <span id="contadorLecturas">0</span><br>
    <span class="pequeno">alpha (crudo):</span> <span id="alpha">—</span><br>
    <span class="pequeno">acumulado invertido:</span> <span id="hcont">—</span>
  </div>

  <button id="calibrar">📍 CALIBRAR COMO POSICIÓN 0</button>

  <div class="box" id="boxCalib">
    <strong>Estado:</strong> <span id="estadoCalib">sin calibrar</span><br>
    <span class="pequeno">Ángulo relativo:</span> <span id="rel">—</span>
  </div>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const estadoPermiso = document.getElementById("estadoPermiso");
    const boxPermiso = document.getElementById("boxPermiso");
    const contadorLecturas = document.getElementById("contadorLecturas");
    const alphaEl = document.getElementById("alpha");
    const hcontEl = document.getElementById("hcont");
    const boxLectura = document.getElementById("boxLectura");
    const estadoCalib = document.getElementById("estadoCalib");
    const relEl = document.getElementById("rel");
    const boxCalib = document.getElementById("boxCalib");
    const btnCalibrar = document.getElementById("calibrar");
    const btnPermiso = document.getElementById("permiso");

    // INVERTIR SENTIDO: para que girar el teléfono en horario
    // corresponda a la flecha girando en horario en el PC.
    // Si quieres invertir al revés, cambia este 1 por -1.
    const SENTIDO = -1;

    let lecturas = 0;
    let origen = null;
    let acumulado = 0;
    let alphaAnterior = null;

    function handler(event) {
      lecturas++;
      contadorLecturas.textContent = lecturas;

      const alpha = event.alpha;
      alphaEl.textContent = alpha !== null ? alpha.toFixed(2) : "null";

      if (alpha === null) return;

      // Acumular delta sin saltos en 360° → 0°, multiplicado por SENTIDO
      if (alphaAnterior !== null) {
        let delta = alpha - alphaAnterior;
        if (delta > 180) delta -= 360;
        if (delta < -180) delta += 360;
        acumulado += delta * SENTIDO;
      }
      alphaAnterior = alpha;
      hcontEl.textContent = acumulado.toFixed(2);
      boxLectura.classList.add("ok");

      if (origen !== null) {
        const angulo = acumulado - origen;
        const vueltas = Math.trunc(angulo / 360);
        relEl.textContent = angulo.toFixed(2) + "°";
        Protobject.Core.send({ angulo: angulo, vueltas: vueltas }).to("index.html");
      }
    }

    btnPermiso.addEventListener("click", async () => {
      try {
        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
          const respuesta = await DeviceOrientationEvent.requestPermission();
          estadoPermiso.textContent = respuesta;
          boxPermiso.classList.add(respuesta === "granted" ? "ok" : "err");
          if (respuesta === "granted") {
            btnPermiso.style.display = "none";
            window.addEventListener("deviceorientationabsolute", handler, true);
            window.addEventListener("deviceorientation", handler, true);
          }
        } else {
          estadoPermiso.textContent = "no requerido";
          boxPermiso.classList.add("ok");
          btnPermiso.style.display = "none";
          window.addEventListener("deviceorientationabsolute", handler, true);
          window.addEventListener("deviceorientation", handler, true);
        }
      } catch (err) {
        estadoPermiso.textContent = "ERROR: " + err.message;
        boxPermiso.classList.add("err");
      }
    });

    function calibrar(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      if (alphaAnterior === null) {
        estadoCalib.textContent = "ESPERA, no llega lectura. ¿Pediste permiso?";
        boxCalib.classList.add("err");
        return;
      }
      origen = acumulado;
      estadoCalib.textContent = "✓ CALIBRADO";
      boxCalib.classList.remove("err");
      boxCalib.classList.add("ok");
      btnCalibrar.textContent = "🔄 RECALIBRAR";
      Protobject.Core.send({ angulo: 0, vueltas: 0 }).to("index.html");
    }

    btnCalibrar.addEventListener("touchstart", calibrar);
    btnCalibrar.addEventListener("click", calibrar);
  </script>

  <script src="config.js"></script>
</body>
</html>
