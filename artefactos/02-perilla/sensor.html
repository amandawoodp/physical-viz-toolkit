<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sensor perilla</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif; padding: 20px; margin: 0;
      background: #fafafa; text-align: center;
    }
    #instr {
      font-size: 22px; margin-top: 20px; color: #333;
    }
    #valor {
      font-size: 64px; margin: 30px 0; color: #2a7; font-weight: bold;
    }
    button {
      display: block; width: 100%;
      font-weight: bold;
      border: none; border-radius: 14px;
      margin: 15px 0;
      touch-action: manipulation;
      cursor: pointer;
    }
    #permiso {
      padding: 18px; font-size: 18px;
      background: #e63946; color: white;
    }
    #calibrar {
      padding: 25px; font-size: 22px;
      background: #2a7; color: white;
    }
    #calibrar:active { background: #1a5; }
  </style>
</head>
<body>

  <button id="permiso">PEDIR PERMISO DE ORIENTACIÓN</button>

  <div id="instr">Pon el teléfono plano sobre la mesa.</div>

  <button id="calibrar" style="display:none">📍 CALIBRAR COMO POSICIÓN 0</button>

  <div id="valor">—</div>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const instr = document.getElementById("instr");
    const valorEl = document.getElementById("valor");
    const btnCalibrar = document.getElementById("calibrar");
    const btnPermiso = document.getElementById("permiso");

    // SENTIDO de la rotación. -1 hace que girar el teléfono en horario
    // corresponda a la flecha del PC también en horario.
    const SENTIDO = -1;

    // Filtro de ruido: solo enviar al PC cambios > este umbral.
    const UMBRAL_GRADOS = 1;

    let origen = null;
    let acumulado = 0;
    let alphaAnterior = null;
    let anguloPrevio = null;

    // ---- LISTENER DEL SENSOR DE ORIENTACIÓN ----
    // Usamos la API nativa 'deviceorientation' del navegador.
    // 'alpha' es el ángulo de brújula (0-360°). Como se reinicia al
    // cruzar 360°, lo acumulamos manualmente para conseguir un valor
    // continuo en ambos sentidos.
    function handler(event) {
      const alpha = event.alpha;
      if (alpha === null) return;

      if (alphaAnterior !== null) {
        let delta = alpha - alphaAnterior;
        if (delta > 180) delta -= 360;
        if (delta < -180) delta += 360;
        acumulado += delta * SENTIDO;
      }
      alphaAnterior = alpha;

      // Mostrar localmente el ángulo crudo o el relativo
      if (origen === null) {
        valorEl.textContent = "—";
        return;
      }

      const angulo = acumulado - origen;
      const vueltas = Math.trunc(angulo / 360);

      valorEl.textContent = Math.round(angulo) + "°";

      // Filtro: solo enviar si cambió suficientemente
      if (anguloPrevio !== null && Math.abs(angulo - anguloPrevio) < UMBRAL_GRADOS) {
        return;
      }
      anguloPrevio = angulo;

      Protobject.Core.send({ angulo: angulo, vueltas: vueltas }).to("index.html");
    }

    // ---- PEDIR PERMISO DE iOS Y EMPEZAR ----
    btnPermiso.addEventListener("click", async () => {
      try {
        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
          const respuesta = await DeviceOrientationEvent.requestPermission();
          if (respuesta === "granted") {
            iniciar();
          } else {
            instr.textContent = "Permiso denegado. Recarga la página para reintentar.";
          }
        } else {
          iniciar();
        }
      } catch (err) {
        instr.textContent = "Error: " + err.message;
      }
    });

    function iniciar() {
      btnPermiso.style.display = "none";
      btnCalibrar.style.display = "block";
      instr.textContent = "Pon el teléfono en posición inicial y toca calibrar.";
      window.addEventListener("deviceorientationabsolute", handler, true);
      window.addEventListener("deviceorientation", handler, true);
    }

    // ---- CALIBRAR ----
    function calibrar(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      if (alphaAnterior === null) {
        instr.textContent = "Esperando lectura del sensor… gira un poco el teléfono.";
        return;
      }
      origen = acumulado;
      anguloPrevio = 0;
      instr.textContent = "✓ Calibrado. Gira el teléfono como una perilla.";
      btnCalibrar.textContent = "🔄 RECALIBRAR";
      Protobject.Core.send({ angulo: 0, vueltas: 0 }).to("index.html");
    }

    btnCalibrar.addEventListener("touchstart", calibrar);
    btnCalibrar.addEventListener("click", calibrar);

    // En navegadores sin permiso explícito (Android), iniciamos solos.
    if (typeof DeviceOrientationEvent === "undefined" ||
        typeof DeviceOrientationEvent.requestPermission !== "function") {
      iniciar();
    }
  </script>

  <script src="config.js"></script>
</body>
</html>
