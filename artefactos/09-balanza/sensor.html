<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sensor balanza</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif; padding: 20px; margin: 0;
      background: #fafafa; text-align: center;
    }
    #instr {
      font-size: 18px; margin-top: 15px; color: #333;
      min-height: 3em;
    }
    #valor {
      font-size: 50px; margin: 20px 0; color: #2a7; font-weight: bold;
    }
    button {
      display: block; width: 100%;
      font-weight: bold;
      border: none; border-radius: 14px;
      margin: 10px 0;
      touch-action: manipulation;
      cursor: pointer;
    }
    #permiso {
      padding: 18px; font-size: 18px;
      background: #e63946; color: white;
    }
    #calibrar {
      padding: 20px; font-size: 18px;
      background: #2a7; color: white;
    }
    #calibrar:active { background: #1a5; }
    #calibrar.done { background: #94d2bd; }
    #reset {
      padding: 14px; font-size: 15px;
      background: #6b7280; color: white;
    }
    #pasos {
      display: flex; justify-content: center; gap: 8px;
      margin: 10px 0;
    }
    .paso {
      width: 30px; height: 8px; border-radius: 4px;
      background: #d1d5db;
    }
    .paso.done { background: #2a7; }
  </style>
</head>
<body>

  <button id="permiso">PEDIR PERMISO DE ORIENTACIÓN</button>

  <div id="pasos" style="display:none">
    <div class="paso" id="paso1"></div>
    <div class="paso" id="paso2"></div>
    <div class="paso" id="paso3"></div>
  </div>

  <div id="instr">Fija el teléfono al eje central de la balanza.</div>

  <div id="valor">—</div>

  <button id="calibrar" style="display:none">PASO 1: PON EN EQUILIBRIO Y TOCA</button>
  <button id="reset" style="display:none">↺ Reiniciar calibración</button>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const instr = document.getElementById("instr");
    const valorEl = document.getElementById("valor");
    const btnPermiso = document.getElementById("permiso");
    const btnCalibrar = document.getElementById("calibrar");
    const btnReset = document.getElementById("reset");
    const pasosEl = document.getElementById("pasos");
    const paso1El = document.getElementById("paso1");
    const paso2El = document.getElementById("paso2");
    const paso3El = document.getElementById("paso3");

    // ESTADO DE CALIBRACIÓN
    // pasoActual: 0 = sin calibrar, 1 = falta máx izq, 2 = falta máx der, 3 = calibrado
    let pasoActual = 0;
    let ultimoGamma = null;
    let equilibrio = null;
    let maxIzquierda = null;   // gamma cuando se inclina al máximo hacia la izq
    let maxDerecha = null;     // gamma cuando se inclina al máximo hacia la der
    let desbalanceAnterior = null;

    const SUAVIZADO = 0.3;
    const UMBRAL = 1;
    let desbalanceSuavizado = 0;

    function handler(event) {
      if (event.gamma === null) return;
      ultimoGamma = event.gamma;

      // Sin calibrar todavía: mostrar grados crudos
      if (pasoActual < 3) {
        valorEl.textContent = Math.round(ultimoGamma) + "°";
        return;
      }

      // Calibrado: calcular desbalance normalizado entre -100 y +100
      const dif = ultimoGamma - equilibrio;
      let pct;

      if (dif < 0) {
        // Inclinada hacia el lado de "máxima izquierda"
        const rangoIzq = maxIzquierda - equilibrio;
        if (rangoIzq === 0) pct = 0;
        else pct = (dif / rangoIzq) * -100;
      } else {
        // Inclinada hacia el lado de "máxima derecha"
        const rangoDer = maxDerecha - equilibrio;
        if (rangoDer === 0) pct = 0;
        else pct = (dif / rangoDer) * 100;
      }

      pct = Math.max(-100, Math.min(100, pct));

      desbalanceSuavizado = desbalanceSuavizado * SUAVIZADO + pct * (1 - SUAVIZADO);

      const desbalance = Math.round(desbalanceSuavizado);
      valorEl.textContent = desbalance > 0 ? "+" + desbalance : desbalance;

      if (desbalanceAnterior === null || Math.abs(desbalance - desbalanceAnterior) >= UMBRAL) {
        desbalanceAnterior = desbalance;
        Protobject.Core.send(desbalance).to("index.html");
      }
    }

    btnPermiso.addEventListener("click", async () => {
      try {
        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
          const r = await DeviceOrientationEvent.requestPermission();
          if (r === "granted") iniciar();
          else instr.textContent = "Permiso denegado. Recarga para reintentar.";
        } else {
          iniciar();
        }
      } catch (err) {
        instr.textContent = "Error: " + err.message;
      }
    });

    function iniciar() {
      btnPermiso.style.display = "none";
      btnCalibrar.style.display = "block";
      pasosEl.style.display = "flex";
      instr.textContent = "Paso 1 de 3: Pon la balanza en equilibrio (platillos vacíos) y toca el botón.";
      window.addEventListener("deviceorientationabsolute", handler, true);
      window.addEventListener("deviceorientation", handler, true);
    }

    function calibrar(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      if (ultimoGamma === null) {
        instr.textContent = "Esperando lectura del sensor...";
        return;
      }

      if (pasoActual === 0) {
        // Paso 1: capturar equilibrio
        equilibrio = ultimoGamma;
        pasoActual = 1;
        paso1El.classList.add("done");
        btnCalibrar.textContent = "PASO 2: INCLINA A LA IZQUIERDA Y TOCA";
        instr.textContent = "Paso 2 de 3: Pon todo el peso en el platillo IZQUIERDO (inclinación máxima a la izq) y toca.";
      }
      else if (pasoActual === 1) {
        // Paso 2: capturar máximo izquierda
        maxIzquierda = ultimoGamma;
        pasoActual = 2;
        paso2El.classList.add("done");
        btnCalibrar.textContent = "PASO 3: INCLINA A LA DERECHA Y TOCA";
        instr.textContent = "Paso 3 de 3: Pon todo el peso en el platillo DERECHO (inclinación máxima a la der) y toca.";
      }
      else if (pasoActual === 2) {
        // Paso 3: capturar máximo derecha
        maxDerecha = ultimoGamma;
        pasoActual = 3;
        paso3El.classList.add("done");
        desbalanceAnterior = 0;
        desbalanceSuavizado = 0;
        btnCalibrar.style.display = "none";
        btnReset.style.display = "block";
        instr.textContent = "✓ Calibrado. Pon objetos en los platillos y mira la pantalla.";
        Protobject.Core.send(0).to("index.html");

        // Si por error capturó iguales o invertidos, advertir
        if (maxIzquierda === equilibrio || maxDerecha === equilibrio) {
          instr.textContent = "⚠️ Calibración inválida. Reinicia y procura inclinar bien en cada paso.";
        }
      }
    }

    function reiniciar(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      pasoActual = 0;
      equilibrio = null;
      maxIzquierda = null;
      maxDerecha = null;
      desbalanceAnterior = null;
      desbalanceSuavizado = 0;
      paso1El.classList.remove("done");
      paso2El.classList.remove("done");
      paso3El.classList.remove("done");
      btnCalibrar.style.display = "block";
      btnReset.style.display = "none";
      btnCalibrar.textContent = "PASO 1: PON EN EQUILIBRIO Y TOCA";
      instr.textContent = "Paso 1 de 3: Pon la balanza en equilibrio (platillos vacíos) y toca el botón.";
    }

    btnCalibrar.addEventListener("touchstart", calibrar);
    btnCalibrar.addEventListener("click", calibrar);
    btnReset.addEventListener("touchstart", reiniciar);
    btnReset.addEventListener("click", reiniciar);

    if (typeof DeviceOrientationEvent === "undefined" ||
        typeof DeviceOrientationEvent.requestPermission !== "function") {
      iniciar();
    }
  </script>

  <script src="config.js"></script>
</body>
</html>
