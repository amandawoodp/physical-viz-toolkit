<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Slider óptico</title>
  <style>
    body {
      margin: 0; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: sans-serif; background: #f4f4f4;
      gap: 40px;
    }
    #titulo {
      font-size: 2.5rem;
      font-weight: bold;
      color: #2a7;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #subtitulo {
      font-size: 1.2rem;
      color: #666;
      margin-top: -30px;
    }
    #salida {
      font-size: 16rem;
      font-weight: bold;
      color: #222;
      line-height: 1;
    }
    #ProtobjectPlusButton {
      width: auto !important;
      height: auto !important;
      padding: 14px 24px !important;
      font-size: 16px !important;
      white-space: nowrap !important;
      top: 20px !important;
      left: 20px !important;
      right: auto !important;
      bottom: auto !important;
      border-radius: 30px !important;
    }
    #ProtobjectPlusButton:after {
      content: " Conectar teléfono";
    }
  </style>
</head>
<body>

  <div id="titulo">Ejemplo 1 · Slider óptico</div>
  <div id="subtitulo">Desliza el cubo por el canal: izquierda, centro o derecha</div>
  <div id="salida">—</div>

  <!-- 1) Cargar el framework Protobject -->
  <script src="https://app.protobject.com/framework/p.js"></script>

  <!-- 2) REGISTRAR EL CALLBACK ANTES de config.js -->
  <!-- Esto es crítico: cuando config.js corra initialize() y se
       abran las conexiones, el callback ya debe estar listo. -->
  <script>
    console.log("PC: registrando callback onReceived...");
    Protobject.Core.onReceived((valor) => {
      console.log("PC recibió:", valor);
      document.getElementById("salida").textContent = valor;
    });
  </script>

  <!-- 3) Recién ahora inicializar Protobject -->
  <script src="config.js"></script>

</body>
</html>
