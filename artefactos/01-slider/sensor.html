<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensor slider</title>
  <style>
    body { font-family: sans-serif; padding: 20px; text-align: center; }
    #instr { font-size: 22px; margin-top: 30px; }
    #valor { font-size: 60px; margin-top: 20px; color: #2a7; }
  </style>
</head>
<body>
  <div id="instr">Apunta la cámara al canal.<br>Pon el cubo en el EXTREMO IZQUIERDO y toca aquí.</div>
  <div id="valor">—</div>

  <script src="https://app.protobject.com/framework/p.js"></script>
  <script src="config.js"></script>
  <script>
    const instr = document.getElementById("instr");
    const valorEl = document.getElementById("valor");

    // ---- FORZAR CÁMARA TRASERA EN iPhone ----
    // Paso 1: pedimos permiso de cámara con facingMode environment.
    //         Esto hace que iOS revele los labels de las cámaras.
    // Paso 2: enumeramos las cámaras y buscamos la trasera por nombre
    //         (en iPhone se llama "Back Camera" o "Cámara posterior").
    // Paso 3: pasamos su índice REAL a Protobject.Aruco.start().
    async function elegirYIniciar() {
      try {
        // Paso 1
        const tmp = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        tmp.getTracks().forEach(t => t.stop());

        // Paso 2
        const devices = await navigator.mediaDevices.enumerateDevices();
        const camaras = devices.filter(d => d.kind === "videoinput");
        console.log("Cámaras encontradas:", camaras);

        let idxTrasera = 0;
        for (let i = 0; i < camaras.length; i++) {
          const nombre = camaras[i].label.toLowerCase();
          if (nombre.includes("back") || nombre.includes("posterior") ||
              nombre.includes("rear") || nombre.includes("trasera")) {
            idxTrasera = i;
            break;
          }
        }
        console.log("Usando cámara índice:", idxTrasera, camaras[idxTrasera]?.label);

        // Paso 3
        Protobject.Aruco.start(100, idxTrasera);
      } catch (err) {
        console.warn("Falló elección de cámara, uso 0 por defecto:", err);
        Protobject.Aruco.start(100, 0);
      }

      Protobject.Aruco.showPreview({ top: 200, left: 10, width: 320, height: 240 });
    }
    elegirYIniciar();

    // ---- ESTADO DE CALIBRACIÓN ----
    let xMin = null;
    let xMax = null;
    let etapa = "izq";
    let ultimaX = null;
    let binAnterior = null;

    // ---- LECTURA DE MARCADORES ----
    Protobject.Aruco.onData((data) => {
      const ids = Object.keys(data);
      if (ids.length === 0) return;

      // Tomamos el marcador más grande (la cara más cercana a la cámara).
      // Así el slider funciona con cualquier cara del cubo.
      let mejorId = ids[0];
      for (const id of ids) {
        if (data[id].size > data[mejorId].size) mejorId = id;
      }
      ultimaX = data[mejorId].position.x;
      valorEl.textContent = "x: " + Math.round(ultimaX);

      if (etapa !== "listo") return;

      // Normalizar al rango calibrado [0, 1]
      let t = (ultimaX - xMin) / (xMax - xMin);
      t = Math.max(0, Math.min(1, t));

      // Mapear a 3 casillas discretas: 0, 1, 2
      const bin = Math.min(2, Math.floor(t * 3));

      // Enviar SOLO cuando cambia la casilla
      if (bin !== binAnterior) {
        binAnterior = bin;
        Protobject.Core.send(bin).to("index.html");
      }
    });

    // ---- CALIBRACIÓN POR TOQUE ----
    document.body.addEventListener("click", () => {
      if (ultimaX === null) {
        instr.textContent = "Aún no veo el cubo. Apunta bien la cámara.";
        return;
      }
      if (etapa === "izq") {
        xMin = ultimaX;
        etapa = "der";
        instr.textContent = "Ahora ponlo al EXTREMO DERECHO y toca aquí.";
      } else if (etapa === "der") {
        xMax = ultimaX;
        etapa = "listo";
        instr.textContent = "¡Listo! Desliza el cubo por el canal.";
      }
    });
  </script>
</body>
</html>
