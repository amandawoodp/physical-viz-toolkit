<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensor slider</title>
  <style>
    body { font-family: sans-serif; padding: 20px; text-align: center; }
    #instr { font-size: 22px; margin-top: 30px; }
    #valor { font-size: 60px; margin-top: 20px; color: #2a7; }
  </style>
</head>
<body>
  <div id="instr">Apunta la cámara al canal.<br>Pon el cubo en el EXTREMO IZQUIERDO y toca aquí.</div>
  <div id="valor">—</div>

  <script src="https://app.protobject.com/framework/p.js"></script>
  <script src="config.js"></script>
  <script>
    const instr = document.getElementById("instr");
    const valorEl = document.getElementById("valor");

    // ---- 0) FORZAR CÁMARA TRASERA EN iPhone ----
    // En iOS, los índices de cámara no son confiables. La forma
    // robusta es pedirla explícitamente con facingMode: "environment".
    // Hacemos esta llamada antes que cualquier cosa para que el
    // navegador "reserve" la cámara correcta.
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: "environment" } }
    }).then((stream) => {
      // Inmediatamente la cerramos: solo queríamos forzar la elección.
      stream.getTracks().forEach(t => t.stop());

      // Ahora arrancamos ArUco. Como ya "tocamos" la trasera primero,
      // el navegador se la entrega cuando Protobject la pida.
      iniciarSensor();
    }).catch((err) => {
      console.warn("No pude forzar trasera, uso default:", err);
      iniciarSensor();
    });

    function iniciarSensor() {
      // Detecta marcadores cada 100 ms
      Protobject.Aruco.start(100, 0);
      Protobject.Aruco.showPreview({ top: 200, left: 10, width: 320, height: 240 });
    }

    // ---- ESTADO DE CALIBRACIÓN ----
    let xMin = null;
    let xMax = null;
    let etapa = "izq";
    let ultimaX = null;
    let binAnterior = null;

    // ---- LECTURA DE MARCADORES ----
    Protobject.Aruco.onData((data) => {
      const ids = Object.keys(data);
      if (ids.length === 0) return;

      let mejorId = ids[0];
      for (const id of ids) {
        if (data[id].size > data[mejorId].size) mejorId = id;
      }
      ultimaX = data[mejorId].position.x;
      valorEl.textContent = "x: " + Math.round(ultimaX);

      if (etapa !== "listo") return;

      let t = (ultimaX - xMin) / (xMax - xMin);
      t = Math.max(0, Math.min(1, t));

      const bin = Math.min(9, Math.floor(t * 10));

      if (bin !== binAnterior) {
        binAnterior = bin;
        Protobject.Core.send(bin).to("index.html");
      }
    });

    // ---- CALIBRACIÓN POR TOQUE ----
    document.body.addEventListener("click", () => {
      if (ultimaX === null) {
        instr.textContent = "Aún no veo el cubo. Apunta bien la cámara.";
        return;
      }
      if (etapa === "izq") {
        xMin = ultimaX;
        etapa = "der";
        instr.textContent = "Ahora ponlo al EXTREMO DERECHO y toca aquí.";
      } else if (etapa === "der") {
        xMax = ultimaX;
        etapa = "listo";
        instr.textContent = "¡Listo! Desliza el cubo por el canal.";
      }
    });
  </script>
</body>
</html>
