<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sensor slider</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 18px;
      margin: 0;
      text-align: center;
      background: #fafafa;
      color: #222;
    }

    #instr {
      font-size: 21px;
      line-height: 1.35;
      margin-top: 18px;
      color: #333;
    }

    #valor {
      font-size: 42px;
      margin-top: 18px;
      color: #2a7;
      font-weight: bold;
    }

    #detalle {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
      line-height: 1.35;
      min-height: 36px;
    }

    #estado {
      font-size: 14px;
      color: #888;
      margin-top: 8px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 18px 14px;
      margin-top: 14px;
      font-size: 18px;
      font-weight: bold;
      background: #2a7;
      color: white;
      touch-action: manipulation;
    }

    button.secundario {
      background: #e5e7eb;
      color: #333;
      font-size: 15px;
      padding: 13px;
    }

    button.done {
      background: #94d2bd;
      color: #064e3b;
    }

    #barra {
      width: 100%;
      height: 28px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 18px;
    }

    #fill {
      width: 0%;
      height: 100%;
      background: #2a7;
      border-radius: 999px;
      transition: width 0.18s linear;
    }
  </style>
</head>

<body>

  <div id="instr">
    Pon el cubo en el extremo 0 del canal y toca calibrar.
  </div>

  <div id="valor">—</div>

  <div id="barra">
    <div id="fill"></div>
  </div>

  <button id="btnCalibrar">Calibrar extremo 0</button>
  <button id="btnReiniciar" class="secundario">Reiniciar calibración</button>
  <button id="btnFlash" class="secundario">Intentar activar flash</button>

  <div id="detalle">Buscando cubo ArUco...</div>
  <div id="estado">Lecturas: 0</div>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const instr = document.getElementById("instr");
    const valorEl = document.getElementById("valor");
    const detalle = document.getElementById("detalle");
    const estadoEl = document.getElementById("estado");
    const btnCalibrar = document.getElementById("btnCalibrar");
    const btnReiniciar = document.getElementById("btnReiniciar");
    const btnFlash = document.getElementById("btnFlash");
    const fill = document.getElementById("fill");

    const LECTURAS_MEDIANA = 5;
    const LECTURAS_ESTABLES_PARA_CAMBIAR = 2;
    const INTERVALO_SALIDA_MS = 160;

    let lecturas = 0;
    let ultimaLectura = null;
    let historial = [];

    let punto0 = null;
    let punto2 = null;
    let eje = null;
    let etapa = "calibrar0";

    let binActual = null;
    let binObjetivo = null;
    let binCandidato = null;
    let contadorCandidato = 0;

    // -----------------------------
    // Cámara / ArUco
    // -----------------------------
    Protobject.Aruco.onData((data) => {
      const punto = obtenerPuntoDelCubo(data);

      if (!punto) {
        detalle.textContent =
          "No veo el cubo. Mejora la luz o revisa que el marcador mire a la cámara.";
        return;
      }

      lecturas++;
      estadoEl.textContent = "Lecturas: " + lecturas;

      historial.push(punto);

      if (historial.length > LECTURAS_MEDIANA) {
        historial.shift();
      }

      ultimaLectura = puntoMediano(historial);

      if (etapa !== "listo") {
        valorEl.textContent = "•";

        detalle.textContent =
          "Cubo detectado · x=" + formatear(ultimaLectura.x) +
          " · y=" + formatear(ultimaLectura.y) +
          " · marcadores=" + punto.cantidad;

        return;
      }

      actualizarSlider(ultimaLectura);
    });

    async function elegirYIniciar() {
      try {
        const tmp = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });

        tmp.getTracks().forEach(t => t.stop());

        const devices = await navigator.mediaDevices.enumerateDevices();
        const camaras = devices.filter(d => d.kind === "videoinput");

        let idxTrasera = 0;

        for (let i = 0; i < camaras.length; i++) {
          const nombre = camaras[i].label.toLowerCase();

          if (
            nombre.includes("back") ||
            nombre.includes("posterior") ||
            nombre.includes("rear") ||
            nombre.includes("trasera")
          ) {
            idxTrasera = i;
            break;
          }
        }

        Protobject.Aruco.start(80, idxTrasera);

      } catch (err) {
        console.warn("No pude forzar cámara trasera. Uso cámara 0.", err);
        Protobject.Aruco.start(80, 0);
      }

      Protobject.Aruco.showPreview({
        top: 260,
        left: 10,
        width: 340,
        height: 255
      });
    }
    let flashActivo = false;
let streamFlash = null;

btnFlash.addEventListener("click", alternarFlash);

btnFlash.addEventListener("touchstart", (e) => {
  e.preventDefault();
  alternarFlash();
});

async function alternarFlash() {
  try {
    if (flashActivo) {
      apagarFlash();
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      detalle.textContent = "Este navegador no permite controlar la cámara.";
      return;
    }

    streamFlash = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        advanced: [{ torch: true }]
      },
      audio: false
    });

    const track = streamFlash.getVideoTracks()[0];

    if (!track) {
      detalle.textContent = "No se encontró una cámara compatible con flash.";
      return;
    }

    const capabilities = track.getCapabilities ? track.getCapabilities() : {};

    if (!capabilities.torch) {
      detalle.textContent =
        "Este navegador no permite activar el flash. Usa más luz externa.";
      apagarFlash();
      return;
    }

    await track.applyConstraints({
      advanced: [{ torch: true }]
    });

    flashActivo = true;
    btnFlash.textContent = "Apagar flash";
    btnFlash.classList.add("done");

    detalle.textContent = "Flash activado. Si el ArUco deja de verse, apágalo.";

  } catch (err) {
    console.warn("No se pudo activar flash:", err);

    detalle.textContent =
      "No se pudo activar el flash desde el navegador. Usa luz externa sobre el cubo.";
  }
}

function apagarFlash() {
  if (streamFlash) {
    streamFlash.getTracks().forEach(track => track.stop());
    streamFlash = null;
  }

  flashActivo = false;
  btnFlash.textContent = "Intentar activar flash";
  btnFlash.classList.remove("done");
}
    elegirYIniciar();

    // -----------------------------
    // Detección robusta del cubo
    // -----------------------------
    function obtenerPuntoDelCubo(data) {
      if (!data) return null;

      const ids = Object.keys(data);
      if (ids.length === 0) return null;

      let sumaX = 0;
      let sumaY = 0;
      let sumaPesos = 0;
      let cantidad = 0;

      for (const id of ids) {
        const m = data[id];

        if (
          !m ||
          !m.position ||
          typeof m.position.x !== "number" ||
          typeof m.position.y !== "number"
        ) {
          continue;
        }

        const peso = Math.max(1, Number(m.size) || 1);

        sumaX += m.position.x * peso;
        sumaY += m.position.y * peso;
        sumaPesos += peso;
        cantidad++;
      }

      if (cantidad === 0 || sumaPesos === 0) return null;

      return {
        x: sumaX / sumaPesos,
        y: sumaY / sumaPesos,
        cantidad: cantidad
      };
    }

    function puntoMediano(lista) {
      const xs = lista.map(p => p.x).sort((a, b) => a - b);
      const ys = lista.map(p => p.y).sort((a, b) => a - b);
      const i = Math.floor(lista.length / 2);

      return {
        x: xs[i],
        y: ys[i],
        cantidad: lista[lista.length - 1].cantidad
      };
    }

    // -----------------------------
    // Calibración
    // -----------------------------
    btnCalibrar.addEventListener("click", calibrar);

    btnCalibrar.addEventListener("touchstart", (e) => {
      e.preventDefault();
      calibrar();
    });

    btnReiniciar.addEventListener("click", reiniciar);

    btnReiniciar.addEventListener("touchstart", (e) => {
      e.preventDefault();
      reiniciar();
    });

    function calibrar() {
      if (!ultimaLectura) {
        instr.textContent =
          "Aún no veo el cubo. Apunta bien la cámara y vuelve a tocar.";
        return;
      }

      if (etapa === "calibrar0") {
        punto0 = {
          x: ultimaLectura.x,
          y: ultimaLectura.y
        };

        etapa = "calibrar2";

        instr.textContent =
          "Ahora pon el cubo en el extremo 2 y toca calibrar.";

        btnCalibrar.textContent = "Calibrar extremo 2";
        btnCalibrar.classList.add("done");

        detalle.textContent =
          "Extremo 0 guardado · x=" + formatear(punto0.x) +
          " · y=" + formatear(punto0.y);

        return;
      }

      if (etapa === "calibrar2") {
        punto2 = {
          x: ultimaLectura.x,
          y: ultimaLectura.y
        };

        const dx = Math.abs(punto2.x - punto0.x);
        const dy = Math.abs(punto2.y - punto0.y);

        eje = dx >= dy ? "x" : "y";

        const distancia = Math.max(dx, dy);

        // IMPORTANTE:
        // Protobject puede entregar coordenadas normalizadas tipo 0–1
        // o coordenadas en pixeles. Por eso el umbral no puede ser fijo.
        const maxCoord = Math.max(
          Math.abs(punto0.x),
          Math.abs(punto0.y),
          Math.abs(punto2.x),
          Math.abs(punto2.y)
        );

        let umbralMinimo;

        if (maxCoord <= 2) {
          // Coordenadas normalizadas
          umbralMinimo = 0.03;
        } else if (maxCoord <= 100) {
          // Coordenadas medianas
          umbralMinimo = 3;
        } else {
          // Coordenadas en pixeles
          umbralMinimo = 12;
        }

        if (distancia < umbralMinimo) {
          instr.textContent =
            "Los extremos quedaron muy cerca. Recalibra moviendo más el cubo.";

          detalle.textContent =
            "Distancia=" + formatear(distancia) +
            " · mínimo=" + formatear(umbralMinimo) +
            " · dx=" + formatear(dx) +
            " · dy=" + formatear(dy);

          return;
        }

        etapa = "listo";

        btnCalibrar.textContent = "✓ Calibrado";
        btnCalibrar.classList.add("done");

        instr.textContent =
          "Listo. Desliza el cubo lentamente por el canal.";

        detalle.textContent =
          "Eje usado: " + eje.toUpperCase() +
          " · distancia=" + formatear(distancia) +
          " · salida gradual 0–1–2.";

        actualizarSlider(ultimaLectura, true);

        return;
      }
    }

    function reiniciar() {
      punto0 = null;
      punto2 = null;
      eje = null;
      etapa = "calibrar0";

      binActual = null;
      binObjetivo = null;
      binCandidato = null;
      contadorCandidato = 0;

      btnCalibrar.textContent = "Calibrar extremo 0";
      btnCalibrar.classList.remove("done");

      valorEl.textContent = "—";
      fill.style.width = "0%";

      instr.textContent =
        "Pon el cubo en el extremo 0 del canal y toca calibrar.";

      detalle.textContent = "Buscando cubo ArUco...";
    }

    // -----------------------------
    // Mapeo 0–2 y salida gradual
    // -----------------------------
    function actualizarSlider(punto, iniciarSinAnimacion = false) {
      const inicio = punto0[eje];
      const fin = punto2[eje];
      const actual = punto[eje];

      let t = (actual - inicio) / (fin - inicio);
      t = Math.max(0, Math.min(1, t));

      // Tres posiciones: 0, 1, 2
      let binCrudo = Math.floor(t * 3);
      binCrudo = Math.max(0, Math.min(2, binCrudo));

      fill.style.width = (t * 100).toFixed(1) + "%";

      if (binCrudo === binCandidato) {
        contadorCandidato++;
      } else {
        binCandidato = binCrudo;
        contadorCandidato = 1;
      }

      if (contadorCandidato >= LECTURAS_ESTABLES_PARA_CAMBIAR) {
        binObjetivo = binCrudo;
      }

      detalle.textContent =
        "t=" + t.toFixed(2) +
        " · objetivo=" + binCrudo +
        " · eje=" + eje.toUpperCase();

      if (iniciarSinAnimacion) {
        binObjetivo = binCrudo;
        binActual = binObjetivo;
        enviarValor(binActual);
      }
    }

    setInterval(() => {
      if (etapa !== "listo") return;
      if (binObjetivo === null) return;

      if (binActual === null) {
        binActual = binObjetivo;
        enviarValor(binActual);
        return;
      }

      if (binActual < binObjetivo) {
        binActual++;
        enviarValor(binActual);
      } else if (binActual > binObjetivo) {
        binActual--;
        enviarValor(binActual);
      }
    }, INTERVALO_SALIDA_MS);

    function enviarValor(valor) {
      valorEl.textContent = valor;

      Protobject.Core.send(valor).to("index.html");

      console.log("Slider envió:", valor);
    }

    function formatear(n) {
      if (Math.abs(n) < 10) {
        return n.toFixed(3);
      }

      return Math.round(n);
    }
  </script>

  <script src="config.js"></script>

</body>
</html>
