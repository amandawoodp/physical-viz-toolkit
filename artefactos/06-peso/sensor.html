<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sensor peso</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif; padding: 20px; margin: 0;
      background: #fafafa; text-align: center;
    }
    #instr {
      font-size: 20px; margin-top: 20px; color: #333;
      min-height: 3em;
    }
    #valor {
      font-size: 50px; margin: 25px 0; color: #2a7; font-weight: bold;
    }
    button {
      display: block; width: 100%;
      font-weight: bold;
      border: none; border-radius: 14px;
      margin: 12px 0;
      touch-action: manipulation;
      cursor: pointer;
    }
    #permiso {
      padding: 18px; font-size: 18px;
      background: #e63946; color: white;
    }
    .cal {
      padding: 22px; font-size: 20px;
      background: #2a7; color: white;
    }
    .cal:active { background: #1a5; }
    .cal.done { background: #94d2bd; }
  </style>
</head>
<body>

  <button id="permiso">PEDIR PERMISO DE ORIENTACIÓN</button>

  <div id="instr">Pega la base del teléfono a la mesa con la esquina superior apoyada en el globo.</div>

  <div id="valor">—</div>

  <button id="calMin" class="cal" style="display:none">😌 SIN APRETAR (0%)</button>
  <button id="calMax" class="cal" style="display:none">💪 APRETANDO AL MÁXIMO (100%)</button>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const instr = document.getElementById("instr");
    const valorEl = document.getElementById("valor");
    const btnPermiso = document.getElementById("permiso");
    const btnMin = document.getElementById("calMin");
    const btnMax = document.getElementById("calMax");

    // Estado
    let ultimoBeta = null;
    let valorMin = null;       // beta cuando no aprietan (globo lleno)
    let valorMax = null;       // beta cuando aprietan al máximo (globo deformado)
    let intensidadAnterior = null;

    // Filtros: evitamos enviar cada pequeña vibración del globo
    const UMBRAL = 2;            // cambios menores a 2% no se mandan al PC
    const SUAVIZADO = 0.3;       // 0 = sin suavizar, cerca de 1 = mucho lag

    let intensidadSuavizada = 0;

    // ---- LISTENER DEL SENSOR ----
    // El teléfono está vertical con la base pegada a la mesa y la
    // esquina superior apoyada en el globo. Al apretar el globo, la
    // esquina superior baja y el teléfono se endereza. Esto cambia
    // principalmente 'beta' (inclinación adelante-atrás).
    function handler(event) {
      if (event.beta === null) return;
      ultimoBeta = event.beta;

      if (valorMin === null || valorMax === null) {
        // Aún no calibrado: mostrar valor crudo localmente
        valorEl.textContent = Math.round(ultimoBeta) + "°";
        return;
      }

      // Normalizar: 0% en valorMin (sin apretar), 100% en valorMax (apretado).
      // Como la fórmula usa la DIFERENCIA, da igual si beta sube o baja al
      // apretar: la calibración define automáticamente el sentido.
      let t = (ultimoBeta - valorMin) / (valorMax - valorMin);
      t = Math.max(0, Math.min(1, t));

      // Suavizado exponencial para filtrar micro-vibraciones del globo
      intensidadSuavizada = intensidadSuavizada * SUAVIZADO + t * (1 - SUAVIZADO);

      const intensidad = Math.round(intensidadSuavizada * 100);
      valorEl.textContent = intensidad + "%";

      // Solo enviar al PC cuando hay cambio significativo
      if (intensidadAnterior === null || Math.abs(intensidad - intensidadAnterior) >= UMBRAL) {
        intensidadAnterior = intensidad;
        Protobject.Core.send(intensidad).to("index.html");
      }
    }

    // ---- PERMISO iOS ----
    btnPermiso.addEventListener("click", async () => {
      try {
        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
          const r = await DeviceOrientationEvent.requestPermission();
          if (r === "granted") iniciar();
          else instr.textContent = "Permiso denegado. Recarga para reintentar.";
        } else {
          iniciar();
        }
      } catch (err) {
        instr.textContent = "Error: " + err.message;
      }
    });

    function iniciar() {
      btnPermiso.style.display = "none";
      btnMin.style.display = "block";
      btnMax.style.display = "block";
      instr.textContent = "Sin apretar el globo, toca 'SIN APRETAR'.";
      window.addEventListener("deviceorientationabsolute", handler, true);
      window.addEventListener("deviceorientation", handler, true);
    }

    // ---- CALIBRACIÓN DE LOS DOS EXTREMOS ----
    function calibrar(esMin, e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      if (ultimoBeta === null) {
        instr.textContent = "Esperando lectura... mueve un poco el teléfono.";
        return;
      }

      if (esMin) {
        valorMin = ultimoBeta;
        btnMin.textContent = "✓ SIN APRETAR calibrado en " + Math.round(valorMin) + "°";
        btnMin.classList.add("done");
        instr.textContent = "Ahora aprieta el globo al máximo y toca 'APRETANDO AL MÁXIMO'.";
      } else {
        valorMax = ultimoBeta;
        btnMax.textContent = "✓ APRETADO calibrado en " + Math.round(valorMax) + "°";
        btnMax.classList.add("done");
        instr.textContent = "✓ Listo. Aprieta el globo con distinta fuerza.";
      }
    }

    btnMin.addEventListener("touchstart", (e) => calibrar(true, e));
    btnMin.addEventListener("click", (e) => calibrar(true, e));
    btnMax.addEventListener("touchstart", (e) => calibrar(false, e));
    btnMax.addEventListener("click", (e) => calibrar(false, e));

    // Android arranca solo (no requiere permiso explícito)
    if (typeof DeviceOrientationEvent === "undefined" ||
        typeof DeviceOrientationEvent.requestPermission !== "function") {
      iniciar();
    }
  </script>

  <script src="config.js"></script>
</body>
</html>
