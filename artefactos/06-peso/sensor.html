<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sensor peso</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif; padding: 20px; margin: 0;
      background: #fafafa; text-align: center;
    }
    #instr {
      font-size: 18px; margin-top: 15px; color: #333;
      min-height: 3em;
    }
    #valor {
      font-size: 50px; margin: 20px 0; color: #2a7; font-weight: bold;
    }
    button {
      display: block; width: 100%;
      font-weight: bold;
      border: none; border-radius: 14px;
      margin: 10px 0;
      touch-action: manipulation;
      cursor: pointer;
    }
    #permiso {
      padding: 18px; font-size: 18px;
      background: #e63946; color: white;
    }
    #calibrar {
      padding: 20px; font-size: 18px;
      background: #2a7; color: white;
    }
    #calibrar:active { background: #1a5; }
    #calibrar.done { background: #94d2bd; }
    #reset {
      padding: 14px; font-size: 15px;
      background: #6b7280; color: white;
    }
    #pasos {
      display: flex; justify-content: center; gap: 8px;
      margin: 10px 0;
    }
    .paso {
      width: 40px; height: 8px; border-radius: 4px;
      background: #d1d5db;
    }
    .paso.done { background: #2a7; }
  </style>
</head>
<body>

  <button id="permiso">PEDIR PERMISO DE ORIENTACIÓN</button>

  <div id="pasos" style="display:none">
    <div class="paso" id="paso1"></div>
    <div class="paso" id="paso2"></div>
  </div>

  <div id="instr">Pega la base del teléfono a la mesa con masking tape y apoya la esquina superior sobre el globo.</div>

  <div id="valor">—</div>

  <button id="calibrar" style="display:none">PASO 1: SIN APRETAR EL GLOBO</button>
  <button id="reset" style="display:none">↺ Reiniciar calibración</button>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const instr = document.getElementById("instr");
    const valorEl = document.getElementById("valor");
    const btnPermiso = document.getElementById("permiso");
    const btnCalibrar = document.getElementById("calibrar");
    const btnReset = document.getElementById("reset");
    const pasosEl = document.getElementById("pasos");
    const paso1El = document.getElementById("paso1");
    const paso2El = document.getElementById("paso2");

    // ESTADO DE CALIBRACIÓN
    // pasoActual: 0 = sin calibrar, 1 = falta máx, 2 = calibrado
    let pasoActual = 0;
    let ultimoBeta = null;
    let betaReposo = null;     // inclinación con el globo sin apretar
    let betaMaximo = null;     // inclinación apretando al máximo
    let intensidadAnterior = null;

    // ===================================================================
    // PARÁMETROS DE FILTRADO
    // ===================================================================

    // Zona muerta: si la intensidad cruda es menor a este %, se considera 0
    // Evita micro-vibraciones del globo cuando no lo estás apretando
    const ZONA_MUERTA = 8;

    // Suavizado exponencial: 0 = sin suavizado, 1 = no se mueve
    // 0.5 es un buen balance entre respuesta y estabilidad
    const SUAVIZADO = 0.5;

    // Cambio mínimo (en %) que dispara un envío al PC
    const UMBRAL = 2;

    let intensidadSuavizada = 0;

    function handler(event) {
      if (event.beta === null) return;
      ultimoBeta = event.beta;

      if (pasoActual < 2) {
        valorEl.textContent = Math.round(ultimoBeta) + "°";
        return;
      }

      // Calcular intensidad normalizada entre 0% y 100%
      const dif = ultimoBeta - betaReposo;
      const rango = betaMaximo - betaReposo;

      let pct;
      if (rango === 0) {
        pct = 0;
      } else {
        pct = (dif / rango) * 100;
      }

      // Aplicar zona muerta
      if (Math.abs(pct) < ZONA_MUERTA) {
        pct = 0;
      } else {
        // Reescalar para que el rango efectivo siga siendo 0 a 100
        const signo = pct < 0 ? -1 : 1;
        pct = signo * ((Math.abs(pct) - ZONA_MUERTA) / (100 - ZONA_MUERTA)) * 100;
      }

      pct = Math.max(0, Math.min(100, pct));

      intensidadSuavizada = intensidadSuavizada * SUAVIZADO + pct * (1 - SUAVIZADO);

      const intensidad = Math.round(intensidadSuavizada);
      valorEl.textContent = intensidad + "%";

      if (intensidadAnterior === null || Math.abs(intensidad - intensidadAnterior) >= UMBRAL) {
        intensidadAnterior = intensidad;
        Protobject.Core.send(intensidad).to("index.html");
      }
    }

    btnPermiso.addEventListener("click", async () => {
      try {
        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
          const r = await DeviceOrientationEvent.requestPermission();
          if (r === "granted") iniciar();
          else instr.textContent = "Permiso denegado. Recarga para reintentar.";
        } else {
          iniciar();
        }
      } catch (err) {
        instr.textContent = "Error: " + err.message;
      }
    });

    function iniciar() {
      btnPermiso.style.display = "none";
      btnCalibrar.style.display = "block";
      pasosEl.style.display = "flex";
      instr.textContent = "Paso 1 de 2: Sin apretar el globo (el teléfono apoyado en su posición de reposo), toca el botón.";
      window.addEventListener("deviceorientationabsolute", handler, true);
      window.addEventListener("deviceorientation", handler, true);
    }

    function calibrar(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      if (ultimoBeta === null) {
        instr.textContent = "Esperando lectura del sensor...";
        return;
      }

      if (pasoActual === 0) {
        // Paso 1: capturar reposo (sin apretar)
        betaReposo = ultimoBeta;
        pasoActual = 1;
        paso1El.classList.add("done");
        btnCalibrar.textContent = "PASO 2: APRETANDO AL MÁXIMO";
        instr.textContent = "Paso 2 de 2: Aprieta el globo al MÁXIMO (todo lo que vas a apretarlo en uso real) y, mientras lo aprietas, toca el botón.";
      }
      else if (pasoActual === 1) {
        // Paso 2: capturar máximo
        betaMaximo = ultimoBeta;
        pasoActual = 2;
        paso2El.classList.add("done");
        intensidadAnterior = 0;
        intensidadSuavizada = 0;
        btnCalibrar.style.display = "none";
        btnReset.style.display = "block";
        instr.textContent = "✓ Calibrado. Suelta el globo y empieza a apretarlo. La pantalla mostrará la intensidad.";
        Protobject.Core.send(0).to("index.html");

        if (betaReposo === betaMaximo) {
          instr.textContent = "⚠️ Calibración inválida: las dos lecturas son iguales. Reinicia y procura apretar bien el globo en el paso 2.";
        }
      }
    }

    function reiniciar(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      pasoActual = 0;
      betaReposo = null;
      betaMaximo = null;
      intensidadAnterior = null;
      intensidadSuavizada = 0;
      paso1El.classList.remove("done");
      paso2El.classList.remove("done");
      btnCalibrar.style.display = "block";
      btnReset.style.display = "none";
      btnCalibrar.textContent = "PASO 1: SIN APRETAR EL GLOBO";
      instr.textContent = "Paso 1 de 2: Sin apretar el globo, toca el botón.";
    }

    btnCalibrar.addEventListener("touchstart", calibrar);
    btnCalibrar.addEventListener("click", calibrar);
    btnReset.addEventListener("touchstart", reiniciar);
    btnReset.addEventListener("click", reiniciar);

    if (typeof DeviceOrientationEvent === "undefined" ||
        typeof DeviceOrientationEvent.requestPermission !== "function") {
      iniciar();
    }
  </script>

  <script src="config.js"></script>
</body>
</html>
