<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sensor de peso</title>
  <style>
    body {
      margin: 0; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: sans-serif; background: #f4f4f4;
      gap: 30px;
    }
    #titulo {
      font-size: 2.5rem;
      font-weight: bold;
      color: #2a7;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #subtitulo {
      font-size: 1.2rem;
      color: #666;
      margin-top: -20px;
    }
    /* Contenedor de la barra vertical */
    #barra-contenedor {
      width: 120px;
      height: 420px;
      background: #fff;
      border: 6px solid #ddd;
      border-radius: 60px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    /* Barra que crece desde abajo */
    #barra-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 0%;
      background: linear-gradient(to top, #16a34a, #facc15, #dc2626);
      transition: height 0.15s ease-out;
    }
    #valor {
      font-size: 5rem;
      font-weight: bold;
      color: #222;
      line-height: 1;
    }
    #ProtobjectPlusButton {
      width: auto !important;
      height: auto !important;
      padding: 14px 24px !important;
      font-size: 16px !important;
      white-space: nowrap !important;
      top: 20px !important;
      left: 20px !important;
      right: auto !important;
      bottom: auto !important;
      border-radius: 30px !important;
    }
    #ProtobjectPlusButton:after {
      content: " Conectar teléfono";
    }
  </style>
</head>
<body>

  <div id="titulo">Ejemplo 6 · Sensor de peso</div>
  <div id="subtitulo">Aprieta el globo lateralmente</div>

  <div id="barra-contenedor">
    <div id="barra-fill"></div>
  </div>

  <div id="valor">0%</div>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    let primerMensaje = false;

    // El teléfono envía un número entero 0-100 (porcentaje de presión)
    Protobject.Core.onReceived((intensidad) => {
      document.getElementById("barra-fill").style.height = intensidad + "%";
      document.getElementById("valor").textContent = intensidad + "%";

      if (!primerMensaje) {
        primerMensaje = true;
        document.getElementById("subtitulo").textContent = "✓ Teléfono conectado · aprieta el globo";
        document.getElementById("subtitulo").style.color = "#2a7";
      }
    });
  </script>

  <script src="config.js"></script>

</body>
</html>
