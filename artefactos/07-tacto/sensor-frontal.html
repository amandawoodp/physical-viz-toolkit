<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sensor frontal V2</title>
  <style>
    body {
      font-family: sans-serif; padding: 15px; margin: 0;
      background: #fafafa; text-align: center;
    }
    h2 { font-size: 18px; margin: 5px; }
    #valor {
      font-size: 24px; margin: 10px 0; color: #2a7; font-weight: bold;
    }
    #lecturas { font-size: 12px; color: #888; }
    #envios { font-size: 14px; color: #2a7; font-weight: bold; }
  </style>
</head>
<body>

  <h2>📷 Cámara FRONTAL V2</h2>
  <div>Pon la mano frente a la cámara.</div>
  <div id="valor">—</div>
  <div id="lecturas">Lecturas: 0</div>
  <div id="envios">Envíos al PC: 0</div>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const valorEl = document.getElementById("valor");
    const lecturasEl = document.getElementById("lecturas");
    const enviosEl = document.getElementById("envios");
    let contador = 0;
    let contadorEnvios = 0;

    async function elegirYIniciar() {
      try {
        const tmp = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        tmp.getTracks().forEach(t => t.stop());

        const devices = await navigator.mediaDevices.enumerateDevices();
        const camaras = devices.filter(d => d.kind === "videoinput");
        let idxTrasera = 0;
        for (let i = 0; i < camaras.length; i++) {
          const n = camaras[i].label.toLowerCase();
          if (n.includes("back") || n.includes("posterior") ||
              n.includes("rear") || n.includes("trasera")) {
            idxTrasera = i;
            break;
          }
        }
        Protobject.HandSensor.start(150, idxTrasera);
      } catch (err) {
        Protobject.HandSensor.start(150, 0);
      }

      Protobject.HandSensor.showPreview({ top: 220, left: 10, width: 320, height: 240 });
    }
    elegirYIniciar();

    Protobject.HandSensor.onData((data) => {
      contador++;
      lecturasEl.textContent = "Lecturas: " + contador;

      if (!data || !data.landmarks || data.landmarks.length === 0) {
        valorEl.textContent = "Sin mano detectada";
        return;
      }

      const mano = data.landmarks[0];

      if (!mano || mano.length < 9) {
        valorEl.textContent = "Mano sin landmarks";
        return;
      }

      const p = mano[8];

      if (!p || p.y === undefined) {
        valorEl.textContent = "Landmark 8 invalido";
        return;
      }

      const y = p.y;

      valorEl.textContent = "altura z: " + y.toFixed(2);

      Protobject.Core.send({ tipo: "frontal", z: y }).to("index.html");

      contadorEnvios++;
      enviosEl.textContent = "Envíos al PC: " + contadorEnvios;
    });
  </script>

  <script src="config.js"></script>
</body>
</html>
