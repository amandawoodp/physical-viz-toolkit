<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sensor frontal (Z)</title>
  <style>
    body {
      font-family: sans-serif; padding: 15px; margin: 0;
      background: #fafafa; text-align: center;
    }
    h2 { font-size: 18px; margin: 5px; }
    #instr { font-size: 14px; color: #333; margin: 10px 0; }
    #valor {
      font-size: 24px; margin: 10px 0; color: #2a7; font-weight: bold;
    }
    #lecturas { font-size: 12px; color: #888; }
    #envios { font-size: 12px; color: #2a7; }
    #debug {
      background: #1f2937;
      color: #10b981;
      font-family: monospace;
      font-size: 10px;
      padding: 8px;
      text-align: left;
      border-radius: 6px;
      margin-top: 15px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <h2>📷 Cámara FRONTAL (altura Z)</h2>
  <div id="instr">Altura del dedo sobre la mesa. Pon este teléfono en la Base A1.</div>
  <div id="valor">—</div>
  <div id="lecturas">Lecturas: 0</div>
  <div id="envios">Envíos al PC: 0</div>
  <div id="debug">[Esperando primer data...]</div>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const valorEl = document.getElementById("valor");
    const lecturasEl = document.getElementById("lecturas");
    const enviosEl = document.getElementById("envios");
    const debugEl = document.getElementById("debug");
    let contador = 0;
    let contadorEnvios = 0;
    let dataMostrada = false;

    function log(texto) {
      debugEl.textContent = texto;
    }

    async function elegirYIniciar() {
      try {
        const tmp = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        tmp.getTracks().forEach(t => t.stop());

        const devices = await navigator.mediaDevices.enumerateDevices();
        const camaras = devices.filter(d => d.kind === "videoinput");
        let idxTrasera = 0;
        for (let i = 0; i < camaras.length; i++) {
          const n = camaras[i].label.toLowerCase();
          if (n.includes("back") || n.includes("posterior") ||
              n.includes("rear") || n.includes("trasera")) {
            idxTrasera = i;
            break;
          }
        }
        Protobject.HandSensor.start(150, idxTrasera);
      } catch (err) {
        Protobject.HandSensor.start(150, 0);
      }

      Protobject.HandSensor.showPreview({ top: 280, left: 10, width: 320, height: 240 });
    }
    elegirYIniciar();

    Protobject.HandSensor.onData((data) => {
      contador++;
      lecturasEl.textContent = "Lecturas: " + contador;

      if (contador % 20 === 0 || !dataMostrada) {
        dataMostrada = true;
        let resumen = "Lectura #" + contador + "\n";
        resumen += "typeof data: " + typeof data + "\n";
        resumen += "isArray: " + Array.isArray(data) + "\n";
        if (data) {
          resumen += "keys: " + Object.keys(data).join(", ") + "\n";
          if (Array.isArray(data)) resumen += "length: " + data.length + "\n";
          try {
            resumen += "JSON: " + JSON.stringify(data).substring(0, 300);
          } catch(e) {
            resumen += "(no se puede serializar)";
          }
        } else {
          resumen += "data es null/undefined";
        }
        log(resumen);
      }

      let mano = null;
      if (Array.isArray(data) && data.length > 0) mano = data[0];
      else if (data && data.hands && data.hands.length > 0) mano = data.hands[0];

      if (!mano) {
        valorEl.textContent = "Sin mano detectada";
        return;
      }

      let p = null;
      if (mano.landmarks && mano.landmarks[8]) p = mano.landmarks[8];
      else if (mano[8]) p = mano[8];
      else if (mano.keypoints && mano.keypoints[8]) p = mano.keypoints[8];

      if (!p || p.y === undefined) {
        valorEl.textContent = "Estructura desconocida";
        log("MANO sin landmark 8 reconocido:\n" + JSON.stringify(mano).substring(0, 400));
        return;
      }

      let y = p.y;
      if (y > 1) y = y / 480;

      valorEl.textContent = "altura z: " + y.toFixed(2);

      const mensaje = { tipo: "frontal", z: y };
      Protobject.Core.send(mensaje).to("index.html");

      contadorEnvios++;
      enviosEl.textContent = "Envíos al PC: " + contadorEnvios;
    });
  </script>

  <script src="config.js"></script>
</body>
</html>
