<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sensor movimiento</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif; padding: 20px; margin: 0;
      background: #fafafa; text-align: center;
    }
    #instr {
      font-size: 20px; margin-top: 20px; color: #333;
      min-height: 3em;
    }
    #valor {
      font-size: 45px; margin: 20px 0; color: #2a7; font-weight: bold;
    }
    #lecturas { font-size: 13px; color: #888; }
    button {
      display: block; width: 100%; padding: 20px; font-size: 19px;
      font-weight: bold; border: none; border-radius: 14px;
      margin: 10px 0; touch-action: manipulation; cursor: pointer;
    }
    #permiso { background: #e63946; color: white; }
    .cal { background: #2a7; color: white; }
    .cal:active { background: #1a5; }
    .cal.done { background: #94d2bd; }
  </style>
</head>
<body>

  <button id="permiso">🤳 PEDIR PERMISO DE MOVIMIENTO</button>

  <div id="instr">Toca el botón rojo para activar el acelerómetro.</div>

  <div id="valor">—</div>
  <div id="lecturas">Lecturas: 0</div>

  <button id="calReposo" class="cal" style="display:none">🛑 GRABAR REPOSO</button>
  <button id="calSacudida" class="cal" style="display:none">💥 GRABAR SACUDIDA FUERTE</button>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const instr = document.getElementById("instr");
    const valorEl = document.getElementById("valor");
    const lecturasEl = document.getElementById("lecturas");
    const btnPermiso = document.getElementById("permiso");
    const btnReposo = document.getElementById("calReposo");
    const btnSacudida = document.getElementById("calSacudida");

    // Estado
    let contadorLecturas = 0;
    let ultimaMagnitud = null;
    let pico = 0;                  // pico máximo desde la última actualización
    let valorReposo = null;        // magnitud típica con el teléfono quieto
    let valorSacudida = null;      // magnitud típica al sacudir

    // ---- Lógica de evento "SACUDIDA" ----
    // Mismo patrón que el sensor de ruido: umbral + duración + cooldown.
    const DURACION_MS = 80;        // sostener sobre el umbral 80ms
    const COOLDOWN_MS = 400;       // 400ms entre eventos
    let inicioSobreUmbral = null;
    let ultimoEvento = 0;

    // ---- PEDIR PERMISO iOS ----
    // En iOS 13+ hay que pedir permiso de movimiento explícitamente,
    // y solo se puede pedir desde un toque del usuario.
    btnPermiso.addEventListener("click", async () => {
      try {
        if (typeof DeviceMotionEvent !== "undefined" &&
            typeof DeviceMotionEvent.requestPermission === "function") {
          const r = await DeviceMotionEvent.requestPermission();
          if (r === "granted") iniciar();
          else instr.textContent = "Permiso denegado. Recarga para reintentar.";
        } else {
          iniciar();
        }
      } catch (err) {
        instr.textContent = "Error: " + err.message;
      }
    });

    function iniciar() {
      btnPermiso.style.display = "none";
      btnReposo.style.display = "block";
      btnSacudida.style.display = "block";
      instr.textContent = "Pon el teléfono quieto y toca 'GRABAR REPOSO'.";
      Protobject.Acceleration.start(50);  // muestreo 20 veces por segundo
    }

    // ---- LECTURA ----
    // El acelerómetro entrega { x, y, z } en m/s². Como siempre está
    // sometido a la gravedad (~9.8), la MAGNITUD total del vector
    // (sqrt(x²+y²+z²)) en reposo es ~9.8. Cualquier movimiento se
    // suma a esa base. Por eso medimos la diferencia respecto al reposo.
    Protobject.Acceleration.onData((data) => {
      contadorLecturas++;
      lecturasEl.textContent = "Lecturas: " + contadorLecturas;

      const magnitud = Math.sqrt(data.x * data.x + data.y * data.y + data.z * data.z);
      ultimaMagnitud = magnitud;
      valorEl.textContent = magnitud.toFixed(1);

      // Si ya está calibrado, normalizar y detectar eventos
      if (valorReposo !== null && valorSacudida !== null) {
        let pct = (magnitud - valorReposo) / (valorSacudida - valorReposo) * 100;
        pct = Math.max(0, Math.min(100, pct));

        const umbralPct = 60;

        Protobject.Core.send({ tipo: "nivel", intensidad: pct, umbral: umbralPct }).to("index.html");

        const ahora = Date.now();
        if (pct >= umbralPct) {
          if (inicioSobreUmbral === null) inicioSobreUmbral = ahora;
          else if (ahora - inicioSobreUmbral >= DURACION_MS &&
                   ahora - ultimoEvento >= COOLDOWN_MS) {
            ultimoEvento = ahora;
            Protobject.Core.send({ tipo: "evento" }).to("index.html");
            instr.textContent = "¡Sacudida detectada!";
          }
        } else {
          inicioSobreUmbral = null;
        }
      }
    });

    // ---- CALIBRACIÓN ----
    function calibrar(esReposo, e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      if (ultimaMagnitud === null) {
        instr.textContent = "Aún no llegan lecturas del acelerómetro.";
        return;
      }

      if (esReposo) {
        valorReposo = ultimaMagnitud;
        btnReposo.textContent = "✓ REPOSO: " + valorReposo.toFixed(1);
        btnReposo.classList.add("done");
        instr.textContent = "Sacude el teléfono fuerte y toca 'GRABAR SACUDIDA FUERTE' mientras lo haces.";
      } else {
        valorSacudida = ultimaMagnitud;
        if (valorSacudida <= valorReposo) {
          // Si lo "fuerte" fue débil, ajustamos para que igual funcione
          valorSacudida = valorReposo + 10;
        }
        btnSacudida.textContent = "✓ SACUDIDA: " + valorSacudida.toFixed(1);
        btnSacudida.classList.add("done");
        instr.textContent = "✓ Listo. Sacude o golpea el teléfono.";
      }
    }

    btnReposo.addEventListener("touchstart", (e) => calibrar(true, e));
    btnReposo.addEventListener("click", (e) => calibrar(true, e));
    btnSacudida.addEventListener("touchstart", (e) => calibrar(false, e));
    btnSacudida.addEventListener("click", (e) => calibrar(false, e));

    // Android arranca solo
    if (typeof DeviceMotionEvent === "undefined" ||
        typeof DeviceMotionEvent.requestPermission !== "function") {
      iniciar();
    }
  </script>

  <script src="config.js"></script>
</body>
</html>
