<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sensor ambiente</title>
  <style>
    body {
      font-family: sans-serif; padding: 20px; margin: 0;
      background: #fafafa; text-align: center;
    }
    #instr {
      font-size: 20px; margin-top: 20px; color: #333;
    }
    #valor {
      font-size: 45px; margin: 25px 0; color: #2a7; font-weight: bold;
    }
    #brillo-bar {
      width: 100%; height: 30px; background: #eee;
      border-radius: 15px; overflow: hidden; margin: 20px 0;
    }
    #brillo-fill {
      height: 100%; width: 0%;
      background: linear-gradient(to right, #111827, #9ca3af, #fef3c7);
      transition: width 0.2s;
    }
    button {
      display: block; width: 100%; padding: 22px; font-size: 20px;
      font-weight: bold; background: #2a7; color: white;
      border: none; border-radius: 14px; margin: 12px 0;
      touch-action: manipulation;
    }
    button.done { background: #94d2bd; }
    button:active { background: #1a5; }
  </style>
</head>
<body>

  <div id="instr">Inicializando cámara para medir luz...</div>

  <div id="valor">—</div>
  <div id="brillo-bar"><div id="brillo-fill"></div></div>

  <button id="calLuz" style="display:none">☀️ CON LUZ NORMAL</button>
  <button id="calSombra" style="display:none">🌑 TAPANDO LA CÁMARA</button>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const instr = document.getElementById("instr");
    const valorEl = document.getElementById("valor");
    const brilloFill = document.getElementById("brillo-fill");
    const btnLuz = document.getElementById("calLuz");
    const btnSombra = document.getElementById("calSombra");

    // Estado
    let ultimoBrillo = null;
    let brilloLuz = null;       // referencia para "ambiente con luz"
    let brilloSombra = null;    // referencia para "tapando la cámara"
    let estadoAnterior = null;

    // Suavizado para evitar parpadeo en los bordes entre estados
    const SUAVIZADO = 0.3;
    let brilloSuavizado = 0;

    // ---- ARRANQUE: forzar cámara trasera (mismo truco que en el slider) ----
    async function elegirYIniciar() {
      try {
        const tmp = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        tmp.getTracks().forEach(t => t.stop());

        const devices = await navigator.mediaDevices.enumerateDevices();
        const camaras = devices.filter(d => d.kind === "videoinput");

        let idxTrasera = 0;
        for (let i = 0; i < camaras.length; i++) {
          const nombre = camaras[i].label.toLowerCase();
          if (nombre.includes("back") || nombre.includes("posterior") ||
              nombre.includes("rear") || nombre.includes("trasera")) {
            idxTrasera = i;
            break;
          }
        }

        Protobject.LightSensor.start(200, idxTrasera);
      } catch (err) {
        console.warn("Falló elección de cámara:", err);
        Protobject.LightSensor.start(200, 0);
      }

      instr.textContent = "Apunta la cámara hacia donde quieres medir la luz.";
      btnLuz.style.display = "block";
      btnSombra.style.display = "block";
    }
    elegirYIniciar();

    // ---- LECTURA ----
    // LightSensor entrega un número de brillo (típicamente 0-255 según
    // el promedio de luminosidad de los pixeles). Lo procesamos en
    // 3 categorías semánticas usando 2 umbrales calibrados.
    Protobject.LightSensor.onData((brightness) => {
      ultimoBrillo = brightness;

      // Suavizado
      brilloSuavizado = brilloSuavizado * SUAVIZADO + brightness * (1 - SUAVIZADO);

      valorEl.textContent = Math.round(brilloSuavizado);

      // Pintar la barra (asumimos brillo 0-255, normalizamos al ancho)
      brilloFill.style.width = Math.min(100, brilloSuavizado / 255 * 100) + "%";

      // Si no se calibró, no enviamos eventos semánticos todavía
      if (brilloLuz === null || brilloSombra === null) return;

      // Calcular umbrales: dividimos el rango calibrado en tres tercios
      const min = Math.min(brilloLuz, brilloSombra);
      const max = Math.max(brilloLuz, brilloSombra);
      const tercio = (max - min) / 3;

      let estado;
      if (brilloSuavizado < min + tercio) estado = "sombra";
      else if (brilloSuavizado < min + 2 * tercio) estado = "penumbra";
      else estado = "luz";

      // Enviar al PC solo cuando cambia el estado
      if (estado !== estadoAnterior) {
        estadoAnterior = estado;
        Protobject.Core.send({ estado: estado, brillo: brilloSuavizado }).to("index.html");
      }
    });

    // ---- CALIBRACIÓN DE LOS DOS EXTREMOS ----
    function calibrar(esLuz, e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      if (ultimoBrillo === null) {
        instr.textContent = "Esperando lectura de la cámara...";
        return;
      }

      if (esLuz) {
        brilloLuz = brilloSuavizado;
        btnLuz.textContent = "✓ LUZ NORMAL calibrada en " + Math.round(brilloLuz);
        btnLuz.classList.add("done");
        instr.textContent = "Ahora tapa la cámara con la mano y toca 'TAPANDO LA CÁMARA'.";
      } else {
        brilloSombra = brilloSuavizado;
        btnSombra.textContent = "✓ SOMBRA calibrada en " + Math.round(brilloSombra);
        btnSombra.classList.add("done");
        instr.textContent = "✓ Listo. Tapa y destapa la cámara para ver los cambios.";
      }
    }

    btnLuz.addEventListener("touchstart", (e) => calibrar(true, e));
    btnLuz.addEventListener("click", (e) => calibrar(true, e));
    btnSombra.addEventListener("touchstart", (e) => calibrar(false, e));
    btnSombra.addEventListener("click", (e) => calibrar(false, e));
  </script>

  <script src="config.js"></script>
</body>
</html>
