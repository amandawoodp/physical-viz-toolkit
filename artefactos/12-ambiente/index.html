<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sensor de ambiente</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      gap: 30px;
      transition: background 0.5s, color 0.5s;
      background: #fffbea;
      color: #222;
    }

    body.luz {
      background: #fef3c7;
      color: #92400e;
    }

    body.penumbra {
      background: #9ca3af;
      color: #1f2937;
    }

    body.sombra {
      background: #111827;
      color: #f9fafb;
    }

    #titulo {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }

    #subtitulo {
      font-size: 1.2rem;
      margin-top: -20px;
      opacity: 0.7;
      text-align: center;
    }

    #icono {
      font-size: 10rem;
      transition: transform 0.4s;
    }

    #estado {
      font-size: 5rem;
      font-weight: bold;
      line-height: 1;
      text-align: center;
    }

    #valor {
      font-size: 1.1rem;
      opacity: 0.6;
    }

    #ProtobjectPlusButton {
      width: auto !important;
      height: auto !important;
      padding: 14px 24px !important;
      font-size: 16px !important;
      white-space: nowrap !important;
      top: 20px !important;
      left: 20px !important;
      right: auto !important;
      bottom: auto !important;
      border-radius: 30px !important;
    }

    #ProtobjectPlusButton:after {
      content: " Conectar teléfono";
    }
  </style>
</head>

<body>

  <div id="titulo">Ejemplo 12 · Sensor de ambiente</div>
  <div id="subtitulo">Tapa o destapa la cámara del teléfono</div>

  <div id="icono">☀️</div>
  <div id="estado">—</div>
  <div id="valor">esperando datos</div>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    let primerMensaje = false;

    const estilos = {
      luz: {
        texto: "LUZ",
        icono: "☀️"
      },
      penumbra: {
        texto: "PENUMBRA",
        icono: "🌥️"
      },
      sombra: {
        texto: "SOMBRA",
        icono: "🌑"
      }
    };

    Protobject.Core.onReceived((datos) => {
      if (!datos || !datos.estado) return;

      const e = estilos[datos.estado];
      if (!e) return;

      document.getElementById("icono").textContent = e.icono;
      document.getElementById("estado").textContent = e.texto;
      document.getElementById("valor").textContent =
        "brillo: " + Math.round(datos.brillo);

      document.body.classList.remove("luz", "penumbra", "sombra");
      document.body.classList.add(datos.estado);

      const ic = document.getElementById("icono");
      ic.style.transform = "scale(1.3)";

      setTimeout(() => {
        ic.style.transform = "scale(1)";
      }, 250);

      if (!primerMensaje) {
        primerMensaje = true;
        document.getElementById("subtitulo").textContent =
          "✓ Teléfono conectado · tapa la cámara";
      }
    });
  </script>

  <script src="config.js"></script>

</body>
</html>
