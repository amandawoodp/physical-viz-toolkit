<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Panel táctil</title>

  <style>
    :root {
      --green: #20a86b;
      --red: #f03b49;
      --bg: #f7f7f7;
      --text: #2b2b2b;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      touch-action: manipulation;
    }

    body {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
    }

    .fullscreen {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 5;
      border: 0;
      background: var(--green);
      color: white;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      font-size: 14px;
    }

    .panel {
      width: min(900px, 92vw);
      height: min(560px, 78vh);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: clamp(24px, 5vw, 54px);
      align-items: center;
      justify-items: center;
    }

    .hole {
      width: clamp(120px, 18vw, 190px);
      height: clamp(120px, 18vw, 190px);
      border-radius: 999px;
      border: 7px solid var(--green);
      background: white;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(4.5rem, 9vw, 8rem);
      line-height: 1;
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 20px 54px rgba(0,0,0,0.08);
      transition: transform 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }

    .hole:active,
    .hole.active {
      transform: scale(0.94);
      border-color: var(--red);
      color: var(--red);
    }

    @media (orientation: portrait) {
      .panel {
        width: 88vw;
        height: 82vh;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(3, 1fr);
      }

      .hole {
        width: clamp(110px, 32vw, 170px);
        height: clamp(110px, 32vw, 170px);
        font-size: clamp(4rem, 14vw, 7rem);
      }
    }
  </style>
</head>

<body>
  <button class="fullscreen" id="fullscreenBtn">Pantalla completa</button>

  <main class="panel" aria-label="Panel táctil numérico">
    <button class="hole" data-num="1" aria-label="1">1</button>
    <button class="hole" data-num="2" aria-label="2">2</button>
    <button class="hole" data-num="3" aria-label="3">3</button>
    <button class="hole" data-num="4" aria-label="4">4</button>
    <button class="hole" data-num="5" aria-label="5">5</button>
    <button class="hole" data-num="6" aria-label="6">6</button>
  </main>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const botones = Array.from(document.querySelectorAll(".hole"));
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    function enviarNumero(num) {
      botones.forEach((b) => b.classList.toggle("active", b.dataset.num === String(num)));

      Protobject.Core.send({
        tipo: "panel",
        accion: "press",
        id: "zona" + num,
        numero: String(num),
        marcador: String(num),
        valor: Number(num)
      }).to("index.html");

      setTimeout(() => {
        botones.forEach((b) => b.classList.remove("active"));
      }, 180);
    }

    botones.forEach((boton) => {
      const num = boton.dataset.num;
      boton.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        enviarNumero(num);
      });
    });

    fullscreenBtn.addEventListener("click", async () => {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
          fullscreenBtn.style.display = "none";
        }
      } catch (err) {
        console.warn("No se pudo activar pantalla completa", err);
      }
    });
  </script>

  <script src="config.js"></script>
</body>
</html>
