<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel táctil</title>

  <style>
    :root {
      --green: #20a86b;
      --red: #f03b49;
      --text: #2b2b2b;
      --muted: #6b7280;
      --bg: #f7f7f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 22px;
    }

    #ProtobjectPlusButton {
      width: auto !important;
      height: auto !important;
      padding: 14px 24px !important;
      font-size: 16px !important;
      white-space: nowrap !important;
      top: 20px !important;
      left: 20px !important;
      right: auto !important;
      bottom: auto !important;
      border-radius: 30px !important;
      z-index: 10 !important;
    }

    #ProtobjectPlusButton:after {
      content: " Conectar tablet";
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 5vw, 4.8rem);
      line-height: 1;
      letter-spacing: 0.12em;
      color: var(--green);
      font-weight: 900;
      text-transform: uppercase;
    }

    #subtitulo {
      margin-top: -8px;
      font-size: clamp(1rem, 1.8vw, 1.45rem);
      color: var(--muted);
      font-weight: 500;
    }

    .display {
      width: min(44vw, 390px);
      height: min(44vw, 390px);
      min-width: 260px;
      min-height: 260px;
      border: 7px solid var(--green);
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      box-shadow: 0 25px 70px rgba(0,0,0,0.08);
      transition: transform 0.18s ease;
    }

    .display.pop {
      transform: scale(1.035);
    }

    #numero {
      font-size: clamp(7rem, 18vw, 13rem);
      line-height: 1;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.05em;
    }

    .selector {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-top: 8px;
    }

    .mini {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: 3px solid #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.35rem;
      color: #9ca3af;
      background: white;
      transition: all 0.18s ease;
    }

    .mini.active {
      border-color: var(--red);
      color: var(--red);
      transform: translateY(-3px);
    }

    #estado {
      font-size: 1.15rem;
      color: var(--muted);
      min-height: 1.4em;
    }

    @media (max-width: 700px) {
      body {
        padding: 22px;
      }

      .selector {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>
  <h1>Ejemplo 8 · Panel táctil</h1>
  <div id="subtitulo">Toca un número en la tablet</div>

  <main class="display" id="display">
    <div id="numero">—</div>
  </main>

  <section class="selector" aria-label="Números disponibles">
    <div class="mini" data-num="1">1</div>
    <div class="mini" data-num="2">2</div>
    <div class="mini" data-num="3">3</div>
    <div class="mini" data-num="4">4</div>
    <div class="mini" data-num="5">5</div>
    <div class="mini" data-num="6">6</div>
  </section>

  <div id="estado">—</div>

  <script src="https://app.protobject.com/framework/p.js"></script>

  <script>
    const numeroEl = document.getElementById("numero");
    const estadoEl = document.getElementById("estado");
    const displayEl = document.getElementById("display");
    const minis = Array.from(document.querySelectorAll(".mini"));

    function mostrarNumero(num) {
      if (!num) return;

      numeroEl.textContent = num;
      estadoEl.textContent = "Seleccionado: " + num;

      minis.forEach((el) => {
        el.classList.toggle("active", el.dataset.num === String(num));
      });

      displayEl.classList.remove("pop");
      void displayEl.offsetWidth;
      displayEl.classList.add("pop");
    }

    Protobject.Core.onReceived((datos) => {
      if (!datos) return;
      mostrarNumero(datos.numero || datos.marcador || datos.valor);
    });
  </script>

  <script src="config.js"></script>
</body>
</html>
